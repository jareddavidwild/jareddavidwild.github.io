name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Required permissions for the Pages actions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: dist
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Vite requires Node.js >=20.19 or >=22.12; use Node 20.x to satisfy this
          node-version: '20'
      - name: Ensure no built artifacts are committed
        run: |
          echo "Checking for tracked build artifacts..."
          # list tracked files under dist/ or assets/optimized; fail if any are present
          set -e
          FOUND=false
          for p in dist assets/optimized; do
            if git ls-files --error-unmatch "$p" >/dev/null 2>&1 || [ -n "$(git ls-files "$p" 2>/dev/null)" ]; then
              echo "Found tracked files under $p:" || true
              git ls-files "$p" || true
              FOUND=true
            fi
          done
          if [ "$FOUND" = true ]; then
            echo "Error: repository contains generated build artifacts (dist/ or assets/optimized). Remove them from commits and rerun." >&2
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: |
          npm run lint || true
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact (production)
        uses: actions/upload-pages-artifact@v1
        with:
          path: dist

      - name: Deploy to GitHub Pages (production)
        uses: actions/deploy-pages@v1

  preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Prepare preview subfolder
        run: |
          set -e
          PREVIEW_DIR=preview-dist/previews/pr-${{ github.event.number }}
          mkdir -p "$PREVIEW_DIR"
          # copy built site into per-PR subfolder so Pages serves it under /previews/pr-<number>/
          cp -a dist/. "$PREVIEW_DIR/"

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact (preview)
        uses: actions/upload-pages-artifact@v1
        with:
          path: preview-dist

      - name: Deploy to GitHub Pages (preview)
        uses: actions/deploy-pages@v1
      - name: Comment preview URL on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.number }}
          body: |
            ✅ Preview built for this PR: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.number }}/
