name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: dist
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Ensure no built artifacts are committed
        run: |
          echo "Checking for tracked build artifacts..."
          # list tracked files under dist/ or assets/optimized; fail if any are present
          set -e
          FOUND=false
          for p in dist assets/optimized; do
            if git ls-files --error-unmatch "$p" >/dev/null 2>&1 || [ -n "$(git ls-files "$p" 2>/dev/null)" ]; then
              echo "Found tracked files under $p:" || true
              git ls-files "$p" || true
              FOUND=true
            fi
          done
          if [ "$FOUND" = true ]; then
            echo "Error: repository contains generated build artifacts (dist/ or assets/optimized). Remove them from commits and rerun." >&2
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: |
          npm run lint || true
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Deploy to GitHub Pages (production)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}

  preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Deploy preview to gh-pages/previews/pr-<number>
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          destination_dir: previews/pr-${{ github.event.number }}
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Comment preview URL on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.number }}
          body: |
            ✅ Preview built for this PR: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/pr-${{ github.event.number }}/
